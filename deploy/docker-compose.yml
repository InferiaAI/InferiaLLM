# =============================================================================
# InferiaLLM Deployment - Unified (Monolithic) Mode
# =============================================================================
# Usage:
# 1. Copy .env.example to .env and fill in your secrets.
# 2. Run: docker compose up -d
# =============================================================================

services:
  postgres:
    image: postgres:15
#    container_name: inferia-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: inferia
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inferia}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - inferia-net

  redis:
    image: redis:7
 #   container_name: inferia-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - inferia-net

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: inferia-app
    restart: unless-stopped
    pull_policy: always
    env_file: .env
    environment:
      - SERVICE_TYPE=unified
      - API_GATEWAY_URL=${API_GATEWAY_URL:-}
      - INFERENCE_URL=${INFERENCE_URL:-}
      - WEB_SOCKET_URL=${WEB_SOCKET_URL:-}
      - SIDECAR_URL=${SIDECAR_URL:-}
      - LOGSTASH_HOST=${LOGSTASH_HOST:-}
      - LOGSTASH_PORT=${LOGSTASH_PORT:-5959}
    volumes:
      - appdata:/data
    ports:
      - "8000:8000"   # Filtration Gateway
      - "8001:8001"   # Inference Gateway
      - "8002:8002"   # Guardrail Engine
      - "8003:8003"   # Data Engine
      - "8080:8080"   # Orchestration Gateway
      - "8004:3000"   # DePIN Sidecar
      - "3001:3001"   # Dashboard
      - "50051:50051" # gRPC
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inferia-net

  # ---------------------------------------------------------------------------
  # Elasticsearch
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: inferia-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - inferia-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Logstash
  # ---------------------------------------------------------------------------
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: inferia-logstash
    restart: unless-stopped
    environment:
      - LS_JAVA_OPTS=-Xmx512m -Xms256m
      - xpack.monitoring.enabled=false
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_USER=${ELASTICSEARCH_USER:-}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-}
    volumes:
      - ../docker/logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "${LOGSTASH_PORT:-5959}:5959"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - inferia-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9600 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Kibana (Log Dashboard)
  # ---------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: inferia-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - inferia-net

volumes:
  pgdata:
  appdata:
  esdata:

networks:
  inferia-net:
