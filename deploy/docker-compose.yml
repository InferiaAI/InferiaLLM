# =============================================================================
# InferiaLLM Deployment - Unified (Monolithic) Mode
# =============================================================================
# Usage:
# 1. Copy .env.example to .env and fill in your secrets.
# 2. Run: docker compose up -d
# =============================================================================

services:
  postgres:
    image: postgres:15
#    container_name: inferia-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: inferia
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inferia}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 512M
    networks:
      - inferia-net

  redis:
    image: redis:7
 #   container_name: inferia-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
        reservations:
          memory: 128M
    networks:
      - inferia-net

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: inferia-app
    restart: unless-stopped
    env_file: .env
    environment:
      - SERVICE_TYPE=unified
      # Unified config — when the inferia.yaml below is mounted, this points
      # the loader at it. If the file is absent the loader falls back to env
      # + pydantic defaults, so the stack still boots on env-only deployments.
      - INFERIA_CONFIG=/etc/inferia/inferia.yaml
      # Dashboard frontend URLs (DASHBOARD_ prefix avoids colliding with
      # backend service URL env vars like INFERENCE_URL used by Pydantic config)
      - DASHBOARD_API_GATEWAY_URL=${DASHBOARD_API_GATEWAY_URL:-}
      - DASHBOARD_INFERENCE_URL=${DASHBOARD_INFERENCE_URL:-}
      - DASHBOARD_WEB_SOCKET_URL=${DASHBOARD_WEB_SOCKET_URL:-}
      - DASHBOARD_SIDECAR_URL=${DASHBOARD_SIDECAR_URL:-}
      - LOGSTASH_HOST=${LOGSTASH_HOST:-}
      - LOGSTASH_PORT=${LOGSTASH_PORT:-5959}
      - FORWARDED_ALLOW_IPS=${FORWARDED_ALLOW_IPS:-}
    volumes:
      - appdata:/data
      # Unified config yaml — mounted read-only. Edit the host file to change
      # operational parameters; restart the container to apply.
      - ../inferia.yaml.example:/etc/inferia/inferia.yaml:ro
      # Read the public control-plane URL written by the cloudflared sidecar.
      # See the `cloudflared` service definition below. Read-only.
      - tunnel-shared:/var/lib/inferia/tunnel:ro
    ports:
      - "8000:8000"   # Filtration Gateway (external API)
      - "8001:8001"   # Inference Gateway (external API)
      - "3001:3001"   # Dashboard (web UI)
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4"
        reservations:
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inferia-net

  # ---------------------------------------------------------------------------
  # Elasticsearch
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: inferia-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - esdata:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 1G
    networks:
      - inferia-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Logstash
  # ---------------------------------------------------------------------------
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: inferia-logstash
    restart: unless-stopped
    environment:
      - LS_JAVA_OPTS=-Xmx512m -Xms256m
      - xpack.monitoring.enabled=false
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_USER=${ELASTICSEARCH_USER:-}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-}
    volumes:
      - ../docker/logstash/pipeline:/usr/share/logstash/pipeline:ro
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
        reservations:
          memory: 512M
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - inferia-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9600 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Kibana (Log Dashboard)
  # ---------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: inferia-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - inferia-net

  # ---------------------------------------------------------------------------
  # cloudflared: free, ephemeral, no-account public tunnel to the control plane.
  #
  # AWS / GCP / Azure compute nodes need to reach the InferiaLLM control plane
  # from the public internet. On a dev machine behind NAT (or anywhere without
  # a routable inbound port 8000) the worker bootstrap call from the provisioned
  # EC2 instance fails silently and the provisioning flow hangs at the
  # worker_bootstrap phase. cloudflared quick-tunnel creates an ephemeral
  # https://*.trycloudflare.com URL on every start; the wrapper script extracts
  # that URL from stderr, writes it to a shared volume, and the inferia-app
  # picks it up at provision time as the value of CONTROL_PLANE_URL in the
  # cloud user-data.
  cloudflared:
    # The official cloudflare/cloudflared image is distroless (no /bin/sh),
    # so we wrap it in alpine and download the cloudflared binary at first
    # start. Cached in the named volume after the first pull.
    image: alpine:3
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mkdir -p /tunnel /opt/cf
        if [ ! -x /opt/cf/cloudflared ]; then
          echo "[cloudflared-init] downloading cloudflared binary..."
          apk add --no-cache curl ca-certificates >/dev/null
          curl -fsSL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64" \
            -o /opt/cf/cloudflared
          chmod +x /opt/cf/cloudflared
        fi
        # Erase any stale URL from a previous run so the validator never
        # serves a dead tunnel.
        rm -f /tunnel/url
        ( /opt/cf/cloudflared tunnel --no-autoupdate --url http://app:8000 2>&1 | tee /tmp/cf.log ) &
        CF_PID=$$!
        for _ in $$(seq 1 90); do
          URL=$$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cf.log | head -1 || true)
          if [ -n "$$URL" ]; then
            printf '%s\n' "$$URL" > /tunnel/url
            echo "[cloudflared-init] tunnel URL: $$URL (written to /tunnel/url)"
            break
          fi
          sleep 1
        done
        if [ ! -s /tunnel/url ]; then
          echo "[cloudflared-init] WARN: tunnel URL not detected within 90s"
        fi
        wait $$CF_PID
    volumes:
      - tunnel-shared:/tunnel
      - cf-bin:/opt/cf
    depends_on:
      app:
        condition: service_started
    networks:
      - inferia-net

volumes:
  pgdata:
  appdata:
  esdata:
  # Shared between the cloudflared sidecar (writer) and inferia-app (reader)
  # so the control-plane public URL can be discovered on every provision.
  tunnel-shared:
  # Caches the cloudflared binary so we don't re-download on every restart.
  cf-bin:

networks:
  inferia-net:
