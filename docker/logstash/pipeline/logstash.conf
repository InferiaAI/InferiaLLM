# =============================================================================
# InferiaLLM Logstash Pipeline
# =============================================================================
# Receives structured JSON logs from InferiaLLM services via TCP.
# python-logstash v1 sends each record as a JSON object with fields:
#   @timestamp, @version, message, host, path, type, tags,
#   levelname, logger_name, stack_info, and any extra fields
#   (e.g. service_name injected by _ServiceNameFilter).
# =============================================================================

input {
  tcp {
    port  => 5959
    codec => json_lines
  }
}

filter {
  # Normalize the log level field to ECS-compatible [log][level]
  if [levelname] {
    mutate {
      rename => { "levelname" => "[log][level]" }
    }
  }

  # Normalize logger name
  if [logger_name] {
    mutate {
      rename => { "logger_name" => "[log][logger]" }
    }
  }

  # Tag with the service name when present
  if [service_name] {
    mutate {
      add_field => { "[service][name]" => "%{service_name}" }
    }
  }

  # Drop empty keep-alive / heartbeat messages
  if [message] == "" {
    drop {}
  }
}

output {
  # Echo to stdout so `docker logs inferia-logstash` captures everything
  stdout {
    codec => rubydebug
  }

  # --------------------------------------------------------------------------
  # Elasticsearch (uncomment and set env vars to enable)
  # --------------------------------------------------------------------------
  # elasticsearch {
  #   hosts    => ["${ELASTICSEARCH_URL:http://elasticsearch:9200}"]
  #   index    => "inferia-logs-%{+YYYY.MM.dd}"
  #   user     => "${ELASTICSEARCH_USER:}"
  #   password => "${ELASTICSEARCH_PASSWORD:}"
  # }
}
