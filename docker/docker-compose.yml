services:
  postgres:
    image: postgres:15
    container_name: inferia-postgres
    environment:
      POSTGRES_USER: ${PG_ADMIN_USER:-inferia}
      POSTGRES_PASSWORD: ${PG_ADMIN_PASSWORD:-inferia}
      POSTGRES_DB: inferia
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - inferia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inferia"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: inferia-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - inferia-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # Unified Profile
  # ==========================================
  inferia-unified:
    image: inferiaai/inferiallm:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: unified
    container_name: inferia-unified
    profiles: ["unified"]
    env_file:
      - ../.env
    environment:
      - POSTGRES_DSN=postgresql://inferia:inferia@inferia-postgres:5432/inferia
      - REDIS_URL=redis://inferia-redis:6379/0
      - SERVICE_TYPE=unified
      - API_GATEWAY_URL=${API_GATEWAY_URL:-}
      - INFERENCE_URL=${INFERENCE_URL:-}
      - WEB_SOCKET_URL=${WEB_SOCKET_URL:-}
      - SIDECAR_URL=${SIDECAR_URL:-}
      - LOGSTASH_HOST=${LOGSTASH_HOST:-}
      - LOGSTASH_PORT=${LOGSTASH_PORT:-5959}
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "8080:8080"
      - "3000:3000"
      - "3001:3001"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inferia-net

  # ==========================================
  # Split Profile (Microservices)
  # ==========================================
  api-gateway:
    image: inferiaai/inferia-api-gateway:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api-gateway
    container_name: inferia-api-gateway
    profiles: ["split"]
    env_file:
      - ../.env
    environment:
      - POSTGRES_DSN=postgresql://inferia:inferia@inferia-postgres:5432/inferia
      - REDIS_URL=redis://inferia-redis:6379/0
      - SERVICE_TYPE=api_gateway
      - LOGSTASH_HOST=${LOGSTASH_HOST:-}
      - LOGSTASH_PORT=${LOGSTASH_PORT:-5959}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inferia-net

  inference:
    image: inferiaai/inferia-inference:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: inference
    container_name: inferia-inference
    profiles: ["split"]
    env_file:
      - ../.env
    environment:
      - POSTGRES_DSN=postgresql://inferia:inferia@inferia-postgres:5432/inferia
      - REDIS_URL=redis://inferia-redis:6379/0
      - API_GATEWAY_URL=http://api-gateway:8000
      - SERVICE_TYPE=inference
      - LOGSTASH_HOST=${LOGSTASH_HOST:-}
      - LOGSTASH_PORT=${LOGSTASH_PORT:-5959}
    ports:
      - "8001:8001"
    depends_on:
      - api-gateway
    networks:
      - inferia-net

  orchestration:
    image: inferiaai/inferia-orchestration:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: orchestration
    container_name: inferia-orchestration
    profiles: ["split"]
    env_file:
      - ../.env
    environment:
      - POSTGRES_DSN=postgresql://inferia:inferia@inferia-postgres:5432/inferia
      - REDIS_URL=redis://inferia-redis:6379/0
      - API_GATEWAY_URL=http://api-gateway:8000
      - SERVICE_TYPE=orchestration
      - LOGSTASH_HOST=${LOGSTASH_HOST:-}
      - LOGSTASH_PORT=${LOGSTASH_PORT:-5959}
    ports:
      - "8080:8080"
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - inferia-net

  # ---------------------------------------------------------------------------
  # Elasticsearch
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: inferia-elasticsearch
    profiles: ["logstash"]
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - inferia-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Logstash
  # ---------------------------------------------------------------------------
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: inferia-logstash
    profiles: ["logstash"]
    restart: unless-stopped
    environment:
      - LS_JAVA_OPTS=-Xmx512m -Xms256m
      - xpack.monitoring.enabled=false
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_USER=${ELASTICSEARCH_USER:-}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-}
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "${LOGSTASH_PORT:-5959}:5959"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - inferia-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9600 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Kibana (Log Dashboard)
  # ---------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: inferia-kibana
    profiles: ["logstash"]
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - inferia-net

volumes:
  pgdata:
  esdata:

networks:
  inferia-net:
