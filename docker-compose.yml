# =============================================================================
# InferiaLLM Deployment - Unified (Monolithic) Mode
# =============================================================================
# Usage:
# 1. Copy .env.example to .env and fill in your secrets.
# 2. Run: docker compose up -d
# =============================================================================

name: deploy

services:
  postgres:
    image: postgres:15
#    container_name: inferia-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: inferia
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inferia}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 512M
    networks:
      - inferia-net

  redis:
    image: redis:7
 #   container_name: inferia-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
        reservations:
          memory: 128M
    networks:
      - inferia-net

  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: inferia-app
    restart: unless-stopped
    env_file: .env
    environment:
      - SERVICE_TYPE=unified
      # Dashboard frontend URLs (DASHBOARD_ prefix avoids colliding with
      # backend service URL env vars like INFERENCE_URL used by Pydantic config)
      - DASHBOARD_API_GATEWAY_URL=${DASHBOARD_API_GATEWAY_URL:-}
      - DASHBOARD_INFERENCE_URL=${DASHBOARD_INFERENCE_URL:-}
      - DASHBOARD_WEB_SOCKET_URL=${DASHBOARD_WEB_SOCKET_URL:-}
      - DASHBOARD_SIDECAR_URL=${DASHBOARD_SIDECAR_URL:-}
      - DASHBOARD_LLMFIT_SERVER_URL=${DASHBOARD_LLMFIT_SERVER_URL:-}
      - FORWARDED_ALLOW_IPS=${FORWARDED_ALLOW_IPS:-}
      - INFERIA_MODEL_CACHE_DIR=${INFERIA_MODEL_CACHE_DIR:-/var/lib/inferia/models}
      - INFERIA_MODEL_CACHE_MAX_GB=${INFERIA_MODEL_CACHE_MAX_GB:-100}
      - INFERIA_HF_TOKEN=${INFERIA_HF_TOKEN:-}
      - INFERIA_MODEL_MIRROR_BASE=${INFERIA_MODEL_MIRROR_BASE:-}
      - APP_PORT=${APP_PORT:-8000}
    volumes:
      - appdata:/data
      - modelcache:/var/lib/inferia/models
      - pulumistate:/var/lib/inferia/pulumi-state
      # SSH authorized_keys to install on every provisioned EC2 worker.
      - ${INFERIA_SSH_AUTHORIZED_KEYS_FILE:-./.ssh/authorized_keys}:/var/lib/inferia/ssh/authorized_keys:ro
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"   # Unified web: /api gateway, /inf inference, /v2 OCI mirror, / dashboard
      - "8080:8080"                                 # Orchestration service internal port
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4"
        reservations:
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inferia-net

  llmfit:
    image: ghcr.io/alexsjones/llmfit
    container_name: inferia-llmfit
    restart: unless-stopped
    command: serve --host 0.0.0.0 --port ${LLMFIT_PORT:-8787}
    networks:
      - inferia-net

  front-envoy:
    image: envoyproxy/envoy:v1.38.2
    container_name: inferia-envoy
    restart: unless-stopped
    ports:
      - "10000:10000"
      - "9901:9901"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      - app
    networks:
      - inferia-net

volumes:
  pgdata:
  appdata:
  modelcache:
  pulumistate:

networks:
  inferia-net:
