# =============================================================================
# InferiaLLM Deployment - Unified (Monolithic) Mode
# =============================================================================
# Usage:
# 1. Copy .env.example to .env and fill in your secrets.
# 2. Run: docker compose up -d
# =============================================================================

name: deploy

services:
  postgres:
    image: postgres:15
#    container_name: inferia-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: inferia
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inferia}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 512M
    networks:
      - inferia-net

  redis:
    image: redis:7
 #   container_name: inferia-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
        reservations:
          memory: 128M
    networks:
      - inferia-net

  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: inferia-app
    restart: unless-stopped
    env_file: .env
    environment:
      - SERVICE_TYPE=unified
      # Dashboard frontend URLs (DASHBOARD_ prefix avoids colliding with
      # backend service URL env vars like INFERENCE_URL used by Pydantic config)
      - DASHBOARD_API_GATEWAY_URL=${DASHBOARD_API_GATEWAY_URL:-}
      - DASHBOARD_INFERENCE_URL=${DASHBOARD_INFERENCE_URL:-}
      - DASHBOARD_WEB_SOCKET_URL=${DASHBOARD_WEB_SOCKET_URL:-}
      - DASHBOARD_SIDECAR_URL=${DASHBOARD_SIDECAR_URL:-}
      - FORWARDED_ALLOW_IPS=${FORWARDED_ALLOW_IPS:-}
      - INFERIA_MODEL_CACHE_DIR=${INFERIA_MODEL_CACHE_DIR:-/var/lib/inferia/models}
      - INFERIA_MODEL_CACHE_MAX_GB=${INFERIA_MODEL_CACHE_MAX_GB:-100}
      - INFERIA_HF_TOKEN=${INFERIA_HF_TOKEN:-}
      - INFERIA_MODEL_MIRROR_BASE=${INFERIA_MODEL_MIRROR_BASE:-}
      - APP_PORT=${APP_PORT:-8000}
    volumes:
      - appdata:/data
      - modelcache:/var/lib/inferia/models
      # Pulumi local-backend state. MUST be a persistent volume: it is the only
      # record of which AWS resources each node stack owns. If the container is
      # recreated (rebuild/redeploy/crash) between `pulumi up` and the later
      # `pulumi destroy`, an ephemeral state dir is wiped → destroy finds an
      # empty stack, silently "succeeds", and the EC2 leaks (DB flips the job to
      # terminated, so no retry ever fires). Persisting it keeps delete able to
      # actually tear the instance down.
      - pulumistate:/var/lib/inferia/pulumi-state
      # SSH authorized_keys to install on every provisioned EC2 worker.
      # Operator drops one or more public keys (one per line) into the
      # host file; Pulumi reads it at provision time and bakes it into
      # the cloud-init user-data for the ubuntu + root users.
      # Override the host path with INFERIA_SSH_AUTHORIZED_KEYS_FILE.
      - ${INFERIA_SSH_AUTHORIZED_KEYS_FILE:-./.ssh/authorized_keys}:/var/lib/inferia/ssh/authorized_keys:ro
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"   # Unified web: /api gateway, /inf inference, /v2 OCI mirror, / dashboard
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4"
        reservations:
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inferia-net

volumes:
  pgdata:
  appdata:
  modelcache:
  pulumistate:

networks:
  inferia-net:
