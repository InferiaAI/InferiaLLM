name: Publish Python Package to PyPI

on:
  release:
    types: [published]
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (build only, don't publish)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Dashboard
        run: |
          cd apps/dashboard
          npm ci
          npm run build
          rm -rf ../../src/dashboard
          cp -r dist ../../src/dashboard

      - name: Build Sidecar
        run: |
          cd src/services/orchestration/services/depin-sidecar
          npm ci
          npm run build

      - name: Build package
        working-directory: .
        run: python -m build

      - name: Show built artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        if: inputs.dry-run != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
          skip-existing: true
