name: Build and Publish Unified Image to GHCR

# Builds the unified InferiaLLM image and pushes it to the GitHub Container
# Registry (ghcr.io). Runs automatically when a GitHub Release is published,
# and on-demand via workflow_dispatch with a custom tag. Uses the built-in
# GITHUB_TOKEN (packages: write) — no extra registry secrets required.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to push (e.g. dev, pr-123, 2026-06-01). Pushed in addition to 'latest'."
        required: false
        default: "manual"
      push_latest:
        description: "Also tag this manual build as 'latest'."
        type: boolean
        required: false
        default: false

env:
  # ghcr image names must be lowercase; keep this literal so it never inherits
  # the mixed-case org slug (InferiaAI) from github.repository_owner.
  REGISTRY_IMAGE: ghcr.io/inferiaai/inferiallm

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && inputs.push_latest }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          target: unified
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
